<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Cover center glow: cyan-purple radial -->
    <radialGradient id="coverGlow" cx="640" cy="340" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.15"/>
      <stop offset="35%" stop-color="#7A2FCD" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent line gradient -->
    <linearGradient id="coverAccentLine" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7A2FCD" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="0" y="0" width="1280" height="720" fill="#0A0A14"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#coverGlow)"/>

  <!-- ===== GRID OVERLAY: horizontal lines ===== -->
  <line x1="0" y1="120" x2="1280" y2="120" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="600" x2="1280" y2="600" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>

  <!-- ===== GRID OVERLAY: vertical lines ===== -->
  <line x1="160" y1="0" x2="160" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="320" y1="0" x2="320" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="480" y1="0" x2="480" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="800" y1="0" x2="800" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="960" y1="0" x2="960" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.07"/>
  <line x1="1120" y1="0" x2="1120" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.05"/>

  <!-- ===== PARTICLE DOTS (upper area) ===== -->
  <circle cx="200" cy="80" r="2" fill="#00D2FF" fill-opacity="0.4"/>
  <circle cx="450" cy="45" r="1.5" fill="#7A2FCD" fill-opacity="0.5"/>
  <circle cx="700" cy="100" r="2.5" fill="#00D2FF" fill-opacity="0.3"/>
  <circle cx="900" cy="60" r="1.5" fill="#FF0080" fill-opacity="0.35"/>
  <circle cx="1050" cy="90" r="2" fill="#00D2FF" fill-opacity="0.25"/>
  <circle cx="350" cy="130" r="1.5" fill="#7A2FCD" fill-opacity="0.3"/>
  <circle cx="1150" cy="140" r="2" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="550" cy="70" r="1" fill="#FF0080" fill-opacity="0.3"/>
  <circle cx="820" cy="150" r="1.5" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="130" cy="160" r="1" fill="#7A2FCD" fill-opacity="0.35"/>
  <circle cx="1000" cy="170" r="2" fill="#FF0080" fill-opacity="0.15"/>
  <circle cx="680" cy="50" r="1" fill="#00D2FF" fill-opacity="0.4"/>

  <!-- ===== CORNER L-SHAPES: top-left ===== -->
  <line x1="40" y1="40" x2="40" y2="100" stroke="#00D2FF" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="40" y1="40" x2="100" y2="40" stroke="#00D2FF" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="40" cy="40" r="3" fill="#00D2FF" fill-opacity="0.6"/>

  <!-- ===== CORNER L-SHAPES: top-right ===== -->
  <line x1="1240" y1="40" x2="1240" y2="80" stroke="#7A2FCD" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1180" y1="40" x2="1240" y2="40" stroke="#7A2FCD" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- ===== CORNER L-SHAPES: bottom-left ===== -->
  <line x1="40" y1="640" x2="40" y2="680" stroke="#7A2FCD" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="40" y1="680" x2="100" y2="680" stroke="#7A2FCD" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- ===== CORNER L-SHAPES: bottom-right ===== -->
  <line x1="1240" y1="620" x2="1240" y2="680" stroke="#00D2FF" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="1180" y1="680" x2="1240" y2="680" stroke="#00D2FF" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="1240" cy="680" r="3" fill="#00D2FF" fill-opacity="0.6"/>

  <!-- ===== TITLE AREA ===== -->
  <text x="100" y="320" font-family="Arial" font-size="58" font-weight="bold" fill="#FFFFFF">{{TITLE}}</text>

  <!-- ===== NEON ACCENT LINE ===== -->
  <rect x="100" y="342" width="500" height="3" fill="url(#coverAccentLine)"/>

  <!-- ===== SUBTITLE ===== -->
  <text x="100" y="390" font-family="Arial" font-size="26" fill="#B0B0C0">{{SUBTITLE}}</text>

  <!-- ===== DECORATIVE DIAMOND (right side) ===== -->
  <path d="M 1050,260 L 1080,290 L 1050,320 L 1020,290 Z" fill="none" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M 1100,300 L 1120,320 L 1100,340 L 1080,320 Z" fill="none" stroke="#7A2FCD" stroke-width="1" stroke-opacity="0.25"/>

  <!-- ===== CIRCUIT-LIKE DECORATION (right area) ===== -->
  <line x1="900" y1="400" x2="1000" y2="400" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="1000" cy="400" r="3" fill="#00D2FF" fill-opacity="0.3"/>
  <line x1="1000" y1="400" x2="1000" y2="460" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="1000" y1="460" x2="1080" y2="460" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="1080" cy="460" r="3" fill="#7A2FCD" fill-opacity="0.3"/>
  <line x1="1080" y1="460" x2="1080" y2="520" stroke="#7A2FCD" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="1080" y1="520" x2="1160" y2="520" stroke="#7A2FCD" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="1160" cy="520" r="3" fill="#00D2FF" fill-opacity="0.25"/>

  <!-- ===== ADDITIONAL CIRCUIT LINES ===== -->
  <line x1="920" y1="440" x2="960" y2="440" stroke="#FF0080" stroke-width="0.6" stroke-opacity="0.15"/>
  <circle cx="960" cy="440" r="2" fill="#FF0080" fill-opacity="0.25"/>
  <line x1="960" y1="440" x2="960" y2="500" stroke="#FF0080" stroke-width="0.6" stroke-opacity="0.1"/>

  <!-- ===== FOOTER: Author and Date ===== -->
  <line x1="100" y1="600" x2="400" y2="600" stroke="#606080" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="100" y="640" font-family="Arial" font-size="18" fill="#B0B0C0">{{AUTHOR}}</text>
  <text x="100" y="665" font-family="Arial" font-size="14" fill="#606080">{{DATE}}</text>

  <!-- ===== FOOTER: Right side decorative ===== -->
  <rect x="1100" y="660" width="120" height="2" fill="#00D2FF" fill-opacity="0.3"/>
</svg>
