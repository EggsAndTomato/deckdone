<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Purple radial glow behind chapter number -->
    <radialGradient id="chapterGlow" cx="300" cy="380" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7A2FCD" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#00D2FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>
    <!-- Left edge gradient strip -->
    <linearGradient id="edgeStrip" x1="0" y1="0" x2="8" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7A2FCD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF0080" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Accent underline gradient -->
    <linearGradient id="chapterAccent" x1="100" y1="0" x2="450" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7A2FCD" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="0" y="0" width="1280" height="720" fill="#0A0A14"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#chapterGlow)"/>

  <!-- ===== LEFT EDGE GRADIENT STRIP ===== -->
  <rect x="0" y="0" width="8" height="720" fill="url(#edgeStrip)"/>

  <!-- ===== LARGE CHAPTER NUMBER (background watermark) ===== -->
  <text x="200" y="500" font-family="Arial" font-size="320" font-weight="bold" fill="#00D2FF" fill-opacity="0.05">{{CHAPTER_NUM}}</text>

  <!-- ===== SUBTLE GRID LINES ===== -->
  <line x1="0" y1="180" x2="1280" y2="180" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="320" y1="0" x2="320" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.03"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.03"/>
  <line x1="960" y1="0" x2="960" y2="720" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.03"/>

  <!-- ===== DECORATIVE GEOMETRIC SHAPES ===== -->
  <!-- Top-right diamond -->
  <path d="M 1100,120 L 1130,150 L 1100,180 L 1070,150 Z" fill="none" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Bottom-right diamond -->
  <path d="M 1050,540 L 1070,560 L 1050,580 L 1030,560 Z" fill="none" stroke="#7A2FCD" stroke-width="0.8" stroke-opacity="0.15"/>
  <!-- Small triangle accent -->
  <path d="M 900,600 L 920,630 L 880,630 Z" fill="none" stroke="#FF0080" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- ===== PARTICLE DOTS ===== -->
  <circle cx="150" cy="120" r="2" fill="#00D2FF" fill-opacity="0.3"/>
  <circle cx="500" cy="80" r="1.5" fill="#7A2FCD" fill-opacity="0.25"/>
  <circle cx="750" cy="150" r="2" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="1050" cy="100" r="1.5" fill="#FF0080" fill-opacity="0.2"/>
  <circle cx="400" cy="600" r="1.5" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="700" cy="580" r="2" fill="#7A2FCD" fill-opacity="0.15"/>
  <circle cx="1200" cy="400" r="1" fill="#00D2FF" fill-opacity="0.2"/>

  <!-- ===== CIRCUIT LINES (right side decoration) ===== -->
  <line x1="950" y1="250" x2="1050" y2="250" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.15"/>
  <circle cx="1050" cy="250" r="3" fill="#00D2FF" fill-opacity="0.2"/>
  <line x1="1050" y1="250" x2="1050" y2="340" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.1"/>
  <line x1="1050" y1="340" x2="1150" y2="340" stroke="#7A2FCD" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="1150" cy="340" r="3" fill="#7A2FCD" fill-opacity="0.2"/>
  <line x1="1150" y1="340" x2="1150" y2="420" stroke="#7A2FCD" stroke-width="0.8" stroke-opacity="0.08"/>
  <circle cx="1150" cy="420" r="2" fill="#FF0080" fill-opacity="0.15"/>

  <!-- ===== CORNER L-SHAPES ===== -->
  <line x1="40" y1="40" x2="40" y2="90" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="40" y1="40" x2="90" y2="40" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="40" cy="40" r="2.5" fill="#00D2FF" fill-opacity="0.5"/>
  <line x1="1240" y1="630" x2="1240" y2="680" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1190" y1="680" x2="1240" y2="680" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="1240" cy="680" r="2.5" fill="#00D2FF" fill-opacity="0.5"/>

  <!-- ===== SECTION LABEL ===== -->
  <text x="100" y="300" font-family="Arial" font-size="14" fill="#00D2FF" font-weight="bold" letter-spacing="4">CHAPTER {{CHAPTER_NUM}}</text>

  <!-- ===== CHAPTER TITLE ===== -->
  <text x="100" y="370" font-family="Arial" font-size="52" font-weight="bold" fill="#FFFFFF">{{CHAPTER_TITLE}}</text>

  <!-- ===== ACCENT UNDERLINE ===== -->
  <rect x="100" y="390" width="350" height="3" fill="url(#chapterAccent)"/>

  <!-- ===== CHAPTER DESCRIPTION ===== -->
  <text x="100" y="440" font-family="Arial" font-size="20" fill="#B0B0C0">{{CHAPTER_DESC}}</text>

  <!-- ===== DECORATIVE DOTS TRAIL (below description) ===== -->
  <circle cx="100" cy="490" r="2" fill="#00D2FF" fill-opacity="0.4"/>
  <circle cx="115" cy="490" r="2" fill="#00D2FF" fill-opacity="0.3"/>
  <circle cx="130" cy="490" r="2" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="145" cy="490" r="2" fill="#7A2FCD" fill-opacity="0.15"/>

  <!-- ===== FOOTER ===== -->
  <text x="1200" y="700" font-family="Arial" font-size="12" fill="#606080" text-anchor="end">{{PAGE_NUM}}</text>
</svg>
