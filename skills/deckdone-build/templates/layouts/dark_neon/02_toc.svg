<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Top accent bar gradient -->
    <linearGradient id="tocTopBar" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#7A2FCD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF0080" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Subtle glow behind CONTENTS label -->
    <radialGradient id="tocGlow" cx="200" cy="100" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7A2FCD" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A14" stop-opacity="0"/>
    </radialGradient>
    <!-- Divider line gradient -->
    <linearGradient id="tocDivider" x1="100" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7A2FCD" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="0" y="0" width="1280" height="720" fill="#0A0A14"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#tocGlow)"/>

  <!-- ===== TOP ACCENT BAR ===== -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#tocTopBar)"/>

  <!-- ===== SUBTLE GRID: vertical lines ===== -->
  <line x1="320" y1="60" x2="320" y2="660" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="640" y1="60" x2="640" y2="660" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="960" y1="60" x2="960" y2="660" stroke="#00D2FF" stroke-width="0.5" stroke-opacity="0.04"/>

  <!-- ===== CONTENTS LABEL ===== -->
  <text x="100" y="80" font-family="Arial" font-size="14" fill="#00D2FF" font-weight="bold" letter-spacing="6">CONTENTS</text>
  <line x1="100" y1="92" x2="230" y2="92" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- ===== LEFT VERTICAL ACCENT LINE ===== -->
  <line x1="80" y1="110" x2="80" y2="620" stroke="#00D2FF" stroke-width="2" stroke-opacity="0.15"/>

  <!-- ===== TOC ITEM 1 ===== -->
  <circle cx="120" cy="155" r="14" fill="#00D2FF" fill-opacity="0.1" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="161" font-family="Arial" font-size="14" fill="#00D2FF" text-anchor="middle" font-weight="bold">01</text>
  <text x="155" y="160" font-family="Arial" font-size="22" fill="#FFFFFF" font-weight="bold">{{TOC_ITEM_1_TITLE}}</text>
  <rect x="100" y="182" width="1100" height="0.5" fill="url(#tocDivider)"/>

  <!-- ===== TOC ITEM 2 ===== -->
  <circle cx="120" cy="235" r="14" fill="#00D2FF" fill-opacity="0.1" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="241" font-family="Arial" font-size="14" fill="#00D2FF" text-anchor="middle" font-weight="bold">02</text>
  <text x="155" y="240" font-family="Arial" font-size="22" fill="#FFFFFF" font-weight="bold">{{TOC_ITEM_2_TITLE}}</text>
  <rect x="100" y="262" width="1100" height="0.5" fill="url(#tocDivider)"/>

  <!-- ===== TOC ITEM 3 ===== -->
  <circle cx="120" cy="315" r="14" fill="#00D2FF" fill-opacity="0.1" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="321" font-family="Arial" font-size="14" fill="#00D2FF" text-anchor="middle" font-weight="bold">03</text>
  <text x="155" y="320" font-family="Arial" font-size="22" fill="#FFFFFF" font-weight="bold">{{TOC_ITEM_3_TITLE}}</text>
  <rect x="100" y="342" width="1100" height="0.5" fill="url(#tocDivider)"/>

  <!-- ===== TOC ITEM 4 ===== -->
  <circle cx="120" cy="395" r="14" fill="#00D2FF" fill-opacity="0.1" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="401" font-family="Arial" font-size="14" fill="#00D2FF" text-anchor="middle" font-weight="bold">04</text>
  <text x="155" y="400" font-family="Arial" font-size="22" fill="#FFFFFF" font-weight="bold">{{TOC_ITEM_4_TITLE}}</text>
  <rect x="100" y="422" width="1100" height="0.5" fill="url(#tocDivider)"/>

  <!-- ===== TOC ITEM 5 ===== -->
  <circle cx="120" cy="475" r="14" fill="#00D2FF" fill-opacity="0.1" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="481" font-family="Arial" font-size="14" fill="#00D2FF" text-anchor="middle" font-weight="bold">05</text>
  <text x="155" y="480" font-family="Arial" font-size="22" fill="#FFFFFF" font-weight="bold">{{TOC_ITEM_5_TITLE}}</text>
  <rect x="100" y="502" width="1100" height="0.5" fill="url(#tocDivider)"/>

  <!-- ===== RIGHT SIDE DECORATIVE ELEMENTS ===== -->
  <!-- Vertical bar with dots -->
  <line x1="1200" y1="120" x2="1200" y2="520" stroke="#7A2FCD" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="1200" cy="155" r="2" fill="#7A2FCD" fill-opacity="0.3"/>
  <circle cx="1200" cy="235" r="2" fill="#7A2FCD" fill-opacity="0.25"/>
  <circle cx="1200" cy="315" r="2" fill="#7A2FCD" fill-opacity="0.3"/>
  <circle cx="1200" cy="395" r="2" fill="#7A2FCD" fill-opacity="0.25"/>
  <circle cx="1200" cy="475" r="2" fill="#7A2FCD" fill-opacity="0.3"/>

  <!-- Small geometric accents -->
  <path d="M 1130,150 L 1145,165 L 1130,180 L 1115,165 Z" fill="none" stroke="#00D2FF" stroke-width="0.8" stroke-opacity="0.15"/>
  <path d="M 1130,350 L 1145,365 L 1130,380 L 1115,365 Z" fill="none" stroke="#FF0080" stroke-width="0.8" stroke-opacity="0.12"/>

  <!-- Particle dots -->
  <circle cx="800" cy="120" r="1.5" fill="#00D2FF" fill-opacity="0.2"/>
  <circle cx="500" cy="550" r="1.5" fill="#7A2FCD" fill-opacity="0.2"/>
  <circle cx="1050" cy="560" r="1" fill="#FF0080" fill-opacity="0.15"/>

  <!-- ===== CORNER L-SHAPES ===== -->
  <line x1="40" y1="40" x2="40" y2="80" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="40" y1="40" x2="80" y2="40" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1240" y1="640" x2="1240" y2="680" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1200" y1="680" x2="1240" y2="680" stroke="#00D2FF" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- ===== BOTTOM ACCENT LINE ===== -->
  <rect x="0" y="717" width="1280" height="3" fill="url(#tocTopBar)" fill-opacity="0.3"/>

  <!-- ===== FOOTER: Page number ===== -->
  <text x="1200" y="700" font-family="Arial" font-size="12" fill="#606080" text-anchor="end">{{PAGE_NUM}}</text>
</svg>
