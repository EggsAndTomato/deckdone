<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green gradient for left sidebar bar -->
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6A4F" stop-opacity="1" />
      <stop offset="100%" stop-color="#7D8A6E" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Background: warm cream -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFAF2" />

  <!-- Left vertical green accent bar (narrow) -->
  <rect x="40" y="0" width="6" height="720" fill="url(#sidebarGrad)" />

  <!-- "Contents" label in Georgia bold, forest green -->
  <text x="100" y="120" font-family="Georgia" font-size="42" font-weight="bold" fill="#2D6A4F">Contents</text>

  <!-- Gold underline accent -->
  <rect x="100" y="138" width="100" height="2" fill="#D4A76A" />

  <!-- TOC Item 1: green circle bullet + title + divider -->
  <circle cx="120" cy="205" r="6" fill="#2D6A4F" />
  <text x="148" y="212" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_1_TITLE}}</text>
  <line x1="100" y1="235" x2="1200" y2="235" stroke="#5C4A3E" stroke-opacity="0.12" stroke-width="1" />

  <!-- TOC Item 2 -->
  <circle cx="120" cy="275" r="6" fill="#2D6A4F" />
  <text x="148" y="282" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_2_TITLE}}</text>
  <line x1="100" y1="305" x2="1200" y2="305" stroke="#5C4A3E" stroke-opacity="0.12" stroke-width="1" />

  <!-- TOC Item 3 -->
  <circle cx="120" cy="345" r="6" fill="#2D6A4F" />
  <text x="148" y="352" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_3_TITLE}}</text>
  <line x1="100" y1="375" x2="1200" y2="375" stroke="#5C4A3E" stroke-opacity="0.12" stroke-width="1" />

  <!-- TOC Item 4 -->
  <circle cx="120" cy="415" r="6" fill="#2D6A4F" />
  <text x="148" y="422" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_4_TITLE}}</text>
  <line x1="100" y1="445" x2="1200" y2="445" stroke="#5C4A3E" stroke-opacity="0.12" stroke-width="1" />

  <!-- TOC Item 5 -->
  <circle cx="120" cy="485" r="6" fill="#2D6A4F" />
  <text x="148" y="492" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_5_TITLE}}</text>
  <line x1="100" y1="515" x2="1200" y2="515" stroke="#5C4A3E" stroke-opacity="0.12" stroke-width="1" />

  <!-- TOC Item 6 -->
  <circle cx="120" cy="555" r="6" fill="#2D6A4F" />
  <text x="148" y="562" font-family="Arial" font-size="22" fill="#3D2C22">{{TOC_ITEM_6_TITLE}}</text>

  <!-- Bottom-right: subtle organic curve decoration -->
  <path d="M 880,720 C 940,680 1020,660 1100,660 C 1180,660 1240,680 1280,700 L 1280,720 Z" fill="#7D8A6E" fill-opacity="0.08" />
  <path d="M 1000,720 C 1050,695 1120,685 1200,690 C 1240,693 1260,700 1280,710 L 1280,720 Z" fill="#D4A76A" fill-opacity="0.06" />

  <!-- Small gold dots near bottom curve -->
  <circle cx="1050" cy="660" r="3" fill="#D4A76A" fill-opacity="0.3" />
  <circle cx="1100" cy="650" r="2.5" fill="#D4A76A" fill-opacity="0.25" />
  <circle cx="1160" cy="655" r="2" fill="#D4A76A" fill-opacity="0.2" />

</svg>
