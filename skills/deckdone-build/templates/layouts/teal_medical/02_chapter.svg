<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background: light gray-blue -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5F9FA"/>

  <!-- Top teal bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#0D7377"/>

  <!-- Right edge vertical teal strip -->
  <rect x="1274" y="0" width="6" height="720" fill="#0D7377" fill-opacity="0.3"/>

  <!-- Large semi-transparent chapter number watermark -->
  <text x="640" y="460" font-family="Arial" font-size="280" font-weight="bold" fill="#5EA8A7" fill-opacity="0.06" text-anchor="middle">{{CHAPTER_NUM}}</text>

  <!-- Chapter title -->
  <text x="640" y="380" font-family="Arial" font-size="56" font-weight="bold" fill="#1A2B3C" text-anchor="middle">{{CHAPTER_TITLE}}</text>

  <!-- Coral accent line below title -->
  <rect x="540" y="400" width="200" height="3" fill="#FF6B35"/>

  <!-- Chapter description -->
  <text x="640" y="450" font-family="Arial" font-size="20" fill="#4A5568" text-anchor="middle">{{CHAPTER_DESC}}</text>

  <!-- Subtle decorative dots -->
  <circle cx="580" cy="520" r="3" fill="#0D7377" fill-opacity="0.2"/>
  <circle cx="605" cy="520" r="3" fill="#5EA8A7" fill-opacity="0.15"/>
  <circle cx="630" cy="520" r="3" fill="#0D7377" fill-opacity="0.10"/>
  <circle cx="655" cy="520" r="3" fill="#5EA8A7" fill-opacity="0.15"/>
  <circle cx="680" cy="520" r="3" fill="#0D7377" fill-opacity="0.2"/>

</svg>
