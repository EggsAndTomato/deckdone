<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Sidebar gradient: teal to light teal -->
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D7377" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5EA8A7" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background: light gray-blue -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5F9FA"/>

  <!-- Left sidebar: teal gradient -->
  <rect x="0" y="0" width="80" height="720" fill="url(#sidebarGrad)"/>

  <!-- Hexagonal background pattern -->
  <polygon points="900,150 943,175 943,225 900,250 857,225 857,175" fill="none" stroke="#0D7377" stroke-width="1" stroke-opacity="0.04"/>
  <polygon points="1100,350 1135,370 1135,410 1100,430 1065,410 1065,370" fill="none" stroke="#5EA8A7" stroke-width="1" stroke-opacity="0.04"/>
  <polygon points="1000,500 1035,520 1035,560 1000,580 965,560 965,520" fill="none" stroke="#0D7377" stroke-width="1" stroke-opacity="0.04"/>
  <polygon points="1180,200 1210,217 1210,253 1180,270 1150,253 1150,217" fill="none" stroke="#5EA8A7" stroke-width="1" stroke-opacity="0.04"/>

  <!-- Contents Header -->
  <text x="140" y="120" font-family="Arial" font-size="36" font-weight="bold" fill="#0D7377">Contents</text>
  <rect x="140" y="135" width="120" height="2" fill="#5EA8A7"/>

  <!-- Item 1 -->
  <circle cx="170" cy="200" r="18" fill="#0D7377"/>
  <text x="170" y="206" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">01</text>
  <text x="205" y="206" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_1_TITLE}}</text>
  <line x1="140" y1="232" x2="1200" y2="232" stroke="#5EA8A7" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Item 2 -->
  <circle cx="170" cy="275" r="18" fill="#5EA8A7"/>
  <text x="170" y="281" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">02</text>
  <text x="205" y="281" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_2_TITLE}}</text>
  <line x1="140" y1="307" x2="1200" y2="307" stroke="#5EA8A7" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Item 3 -->
  <circle cx="170" cy="350" r="18" fill="#0D7377"/>
  <text x="170" y="356" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">03</text>
  <text x="205" y="356" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_3_TITLE}}</text>
  <line x1="140" y1="382" x2="1200" y2="382" stroke="#5EA8A7" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Item 4 -->
  <circle cx="170" cy="425" r="18" fill="#5EA8A7"/>
  <text x="170" y="431" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">04</text>
  <text x="205" y="431" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_4_TITLE}}</text>
  <line x1="140" y1="457" x2="1200" y2="457" stroke="#5EA8A7" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Item 5 -->
  <circle cx="170" cy="500" r="18" fill="#0D7377"/>
  <text x="170" y="506" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">05</text>
  <text x="205" y="506" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_5_TITLE}}</text>
  <line x1="140" y1="532" x2="1200" y2="532" stroke="#5EA8A7" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Item 6 -->
  <circle cx="170" cy="575" r="18" fill="#5EA8A7"/>
  <text x="170" y="581" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">06</text>
  <text x="205" y="581" font-family="Arial" font-size="20" fill="#1A2B3C">{{TOC_ITEM_6_TITLE}}</text>

  <!-- Page Number -->
  <text x="1200" y="690" font-family="Arial" font-size="14" fill="#4A5568" text-anchor="end">{{PAGE_NUM}}</text>

</svg>
