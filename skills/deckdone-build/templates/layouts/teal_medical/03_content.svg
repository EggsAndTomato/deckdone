<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Sidebar gradient: teal to light teal -->
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D7377" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5EA8A7" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background: light gray-blue -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5F9FA"/>

  <!-- Top teal bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#0D7377"/>

  <!-- Left sidebar: teal gradient -->
  <rect x="0" y="3" width="80" height="717" fill="url(#sidebarGrad)"/>

  <!-- Title area -->
  <text x="120" y="70" font-family="Arial" font-size="32" font-weight="bold" fill="#1A2B3C">{{PAGE_TITLE}}</text>

  <!-- Thin divider below title -->
  <line x1="120" y1="90" x2="1220" y2="90" stroke="#5EA8A7" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Content area: dashed rounded border -->
  <!-- Rounded rect path: x=120 y=120 w=1100 h=500 r=10 -->
  <path d="M 130,120 L 1210,120 A 10,10 0 0,1 1220,130 L 1220,610 A 10,10 0 0,1 1210,620 L 130,620 A 10,10 0 0,1 120,610 L 120,130 A 10,10 0 0,1 130,120 Z"
        fill="none" stroke="#5EA8A7" stroke-width="1.5" stroke-dasharray="10,6" stroke-opacity="0.4"/>

  <!-- Content placeholder text -->
  <text x="640" y="375" font-family="Arial" font-size="22" fill="#5EA8A7" fill-opacity="0.5" text-anchor="middle">{{CONTENT_AREA}}</text>

  <!-- Footer: source left -->
  <text x="120" y="690" font-family="Arial" font-size="12" fill="#4A5568" fill-opacity="0.6">{{SOURCE}}</text>

  <!-- Footer: page number right -->
  <text x="1220" y="690" font-family="Arial" font-size="14" fill="#4A5568" text-anchor="end">{{PAGE_NUM}}</text>

  <!-- Molecular structure decoration (bottom-right corner) -->
  <line x1="1130" y1="665" x2="1160" y2="640" stroke="#0D7377" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="1160" y1="640" x2="1195" y2="660" stroke="#0D7377" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="1160" y1="640" x2="1178" y2="605" stroke="#5EA8A7" stroke-width="2" stroke-opacity="0.10"/>
  <circle cx="1130" cy="665" r="7" fill="#0D7377" fill-opacity="0.12"/>
  <circle cx="1160" cy="640" r="5" fill="#5EA8A7" fill-opacity="0.10"/>
  <circle cx="1195" cy="660" r="6" fill="#0D7377" fill-opacity="0.10"/>
  <circle cx="1178" cy="605" r="5" fill="#5EA8A7" fill-opacity="0.08"/>

</svg>
