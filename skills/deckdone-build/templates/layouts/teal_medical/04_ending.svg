<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background: light gray-blue -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5F9FA"/>

  <!-- Top teal bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#0D7377"/>

  <!-- Hexagonal background pattern (very subtle) -->
  <polygon points="200,200 240,220 240,260 200,280 160,260 160,220" fill="none" stroke="#0D7377" stroke-width="1" stroke-opacity="0.04"/>
  <polygon points="1080,450 1120,470 1120,510 1080,530 1040,510 1040,470" fill="none" stroke="#5EA8A7" stroke-width="1" stroke-opacity="0.04"/>
  <polygon points="350,500 385,520 385,560 350,580 315,560 315,520" fill="none" stroke="#0D7377" stroke-width="1" stroke-opacity="0.04"/>

  <!-- Main text: Thank You -->
  <text x="580" y="310" font-family="Arial" font-size="64" font-weight="bold" fill="#1A2B3C" text-anchor="middle">{{THANK_YOU}}</text>

  <!-- Teal underline accent -->
  <rect x="500" y="330" width="160" height="3" fill="#0D7377"/>

  <!-- Ending subtitle -->
  <text x="580" y="380" font-family="Arial" font-size="20" fill="#4A5568" text-anchor="middle">{{ENDING_SUBTITLE}}</text>

  <!-- Closing message -->
  <text x="580" y="440" font-family="Arial" font-size="16" fill="#4A5568" fill-opacity="0.8" text-anchor="middle">{{CLOSING_MESSAGE}}</text>

  <!-- Contact info -->
  <text x="580" y="480" font-family="Arial" font-size="14" fill="#5EA8A7" text-anchor="middle">{{CONTACT_INFO}}</text>

  <!-- Molecular structure decoration (right side) -->
  <line x1="950" y1="480" x2="990" y2="450" stroke="#0D7377" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="990" y1="450" x2="1035" y2="470" stroke="#0D7377" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="990" y1="450" x2="1010" y2="410" stroke="#5EA8A7" stroke-width="2" stroke-opacity="0.12"/>
  <line x1="1035" y1="470" x2="1075" y2="440" stroke="#5EA8A7" stroke-width="2" stroke-opacity="0.12"/>
  <circle cx="950" cy="480" r="7" fill="#0D7377" fill-opacity="0.15"/>
  <circle cx="990" cy="450" r="5" fill="#5EA8A7" fill-opacity="0.12"/>
  <circle cx="1035" cy="470" r="6" fill="#0D7377" fill-opacity="0.12"/>
  <circle cx="1010" cy="410" r="5" fill="#5EA8A7" fill-opacity="0.10"/>
  <circle cx="1075" cy="440" r="5" fill="#0D7377" fill-opacity="0.10"/>

  <!-- Bottom subtle teal rule -->
  <rect x="0" y="717" width="1280" height="3" fill="#0D7377" fill-opacity="0.15"/>

</svg>
